<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام أخطاء الطلبات - مكاني</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --primary-color: #112b4e;
            --secondary-color: #f4f6f9;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #eef2f7;
            margin: 0;
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 800px;
            margin: auto;
            background: #fff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 2px solid var(--primary-color);
            padding-bottom: 15px;
        }
        .header img {
            max-height: 80px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
            font-family: inherit;
        }
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        button {
            background-color: var(--primary-color);
            color: #fff;
            border: none;
            padding: 12px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            width: 100%;
            font-weight: bold;
            margin-top: 10px;
        }
        button:hover {
            background-color: #0b1d36;
        }
        .report-section {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 2px dashed #ccc;
        }
        
        /* تنسيقات تقرير الـ PDF المخفي عن العرض */
        #pdf-container {
            display: none;
        }
        #pdf-content {
            padding: 20px;
            background: white;
            color: black;
            font-family: 'Arial', sans-serif;
        }
        #pdf-content .pdf-header {
            text-align: center;
            margin-bottom: 30px;
        }
        #pdf-content .pdf-header img {
            height: 70px;
        }
        #pdf-content table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 0.5cm; /* المسافة المطلوبة للختم */
            font-size: 12px;
        }
        #pdf-content th, #pdf-content td {
            border: 1px solid #000;
            padding: 8px;
            text-align: center;
        }
        #pdf-content th {
            background-color: var(--primary-color);
            color: white;
        }
        #pdf-content .pdf-footer {
            text-align: left; /* الختم على اليسار */
        }
        #pdf-content .pdf-footer img {
            width: 120px;
            height: auto;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <img src="logo1.png" alt="شعار مكاني">
        <h2>نظام تسجيل أخطاء الطلبات</h2>
    </div>

    <form id="errorForm">
        <div class="grid-2">
            <div class="form-group">
                <label>رقم الطلب</label>
                <input type="text" id="orderId" required>
            </div>
            <div class="form-group">
                <label>تاريخ الطلب</label>
                <input type="date" id="orderDate" required>
            </div>
            <div class="form-group">
                <label>عدد الطلب</label>
                <input type="number" id="quantity" required>
            </div>
            <div class="form-group">
                <label>اللون</label>
                <input type="text" id="color" required>
            </div>
            <div class="form-group">
                <label>السعر</label>
                <input type="number" step="0.01" id="price" required>
            </div>
            <div class="form-group">
                <label>شهر الخطأ</label>
                <input type="month" id="errorMonth" required>
            </div>
            <div class="form-group">
                <label>الشخص المسؤول</label>
                <input type="text" id="responsible" required>
            </div>
        </div>
        <div class="form-group">
            <label>السبب في الخطأ</label>
            <textarea id="errorReason" rows="3" required></textarea>
        </div>
        <button type="submit" id="submitBtn">تسجيل الخطأ في النظام</button>
    </form>

    <div class="report-section">
        <h3>استخراج تقرير الأخطاء (PDF)</h3>
        <div class="grid-2">
            <div class="form-group">
                <label>اختر الشهر المراد استخراج تقريره</label>
                <input type="month" id="reportMonth">
            </div>
            <div class="form-group">
                <label>&nbsp;</label>
                <button type="button" onclick="generateReport()" style="background-color: #d9534f;">تحميل التقرير A4</button>
            </div>
        </div>
    </div>
</div>

<div id="pdf-container">
    <div id="pdf-content">
        <div class="pdf-header">
            <img src="logo1.png" alt="مكاني">
            <h2 id="pdf-title">تقرير أخطاء الطلبات لشهر: </h2>
        </div>
        <table id="pdf-table">
            </table>
        <div class="pdf-footer">
            <img src="logo2.png" alt="ختم مكاني">
        </div>
    </div>
</div>

<script>
    // ضعي رابط الـ Web App الخاص بك هنا
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxcnlEXRFcTzpVIv1gmuC2P--F3XntBv5ILK6XVbeOLp088hCkwGiWZtl7S1ORS/exec';

    // إرسال البيانات لجوجل شيت
    document.getElementById('errorForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const submitBtn = document.getElementById('submitBtn');
        submitBtn.innerText = "جاري التسجيل...";
        submitBtn.disabled = true;

        const data = {
            orderId: document.getElementById('orderId').value,
            orderDate: document.getElementById('orderDate').value,
            quantity: document.getElementById('quantity').value,
            color: document.getElementById('color').value,
            price: document.getElementById('price').value,
            errorMonth: document.getElementById('errorMonth').value,
            errorReason: document.getElementById('errorReason').value,
            responsible: document.getElementById('responsible').value
        };

        fetch(SCRIPT_URL, {
            method: 'POST',
            body: JSON.stringify(data),
            headers: { 'Content-Type': 'text/plain;charset=utf-8' }
        })
        .then(response => response.json())
        .then(res => {
            if(res.status === 'success') {
                alert('تم تسجيل الخطأ بنجاح!');
                document.getElementById('errorForm').reset();
            } else {
                alert('حدث مشكلة أثناء التسجيل.');
            }
            submitBtn.innerText = "تسجيل الخطأ في النظام";
            submitBtn.disabled = false;
        })
        .catch(err => {
            alert('تم الإرسال (تأكد من مراجعة الشيت).');
            document.getElementById('errorForm').reset();
            submitBtn.innerText = "تسجيل الخطأ في النظام";
            submitBtn.disabled = false;
        });
    });

    // جلب البيانات واستخراج PDF
    function generateReport() {
        const month = document.getElementById('reportMonth').value;
        if (!month) {
            alert('الرجاء اختيار الشهر أولاً');
            return;
        }

        alert('جاري جلب البيانات لتجهيز التقرير، يرجى الانتظار...');

        fetch(`${SCRIPT_URL}?month=${month}`)
        .then(response => response.json())
        .then(res => {
            if(res.status === 'success' && res.data.length > 1) {
                buildAndPrintPDF(res.data, month);
            } else {
                alert('لا توجد أخطاء مسجلة في هذا الشهر.');
            }
        })
        .catch(err => alert('خطأ في جلب البيانات.'));
    }

    function buildAndPrintPDF(dataMatrix, month) {
        document.getElementById('pdf-title').innerText = `تقرير أخطاء الطلبات لشهر: ${month}`;
        
        let tableHTML = `<thead><tr>`;
        // الرؤوس
        dataMatrix[0].forEach(header => {
            tableHTML += `<th>${header}</th>`;
        });
        tableHTML += `</tr></thead><tbody>`;
        
        // البيانات
        for(let i = 1; i < dataMatrix.length; i++) {
            tableHTML += `<tr>`;
            dataMatrix[i].forEach(cell => {
                tableHTML += `<td>${cell}</td>`;
            });
            tableHTML += `</tr>`;
        }
        tableHTML += `</tbody>`;
        
        document.getElementById('pdf-table').innerHTML = tableHTML;

        // إعدادات تصدير الـ PDF لتناسب ورقة A4
        const element = document.getElementById('pdf-content');
        element.style.display = 'block';

        const opt = {
            margin:       10,
            filename:     `تقرير_مكاني_${month}.pdf`,
            image:        { type: 'jpeg', quality: 0.98 },
            html2canvas:  { scale: 2 },
            jsPDF:        { unit: 'mm', format: 'a4', orientation: 'landscape' } // Landscape أفضل الجداول العريضة
        };

        html2pdf().set(opt).from(element).save().then(() => {
            element.style.display = 'none'; // إخفاء الحاوية بعد الطباعة
        });
    }
</script>

</body>
</html>
